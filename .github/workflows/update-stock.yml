name: Update NSH stock

# When this runs:
on:
  schedule:
    # NSH refreshes the file every 4 hours, so we fetch every 4 hours to match.
    # Six runs a day, at 01:30, 05:30, 09:30, 13:30, 17:30 and 21:30 UTC.
    # (:30 past avoids the busy top-of-the-hour, when GitHub delays scheduled jobs.)
    # Times are always in UTC. Add, remove or change lines to adjust.
    - cron: "30 1,5,9,13,17,21 * * *"
  workflow_dispatch:   # also adds a "Run workflow" button so you can trigger it by hand

# Allow the job to save the updated file back into the repository:
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get the current website files
        uses: actions/checkout@v5

      - name: Download the newest stock file from NSH
        env:
          NSH_FTP_USER: ${{ secrets.NSH_FTP_USER }}
          NSH_FTP_PASS: ${{ secrets.NSH_FTP_PASS }}
        run: python3 fetch_stock.py

      - name: Save the update (only if the stock actually changed)
        run: |
          git config user.name "stock-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- stock.xml; then
            echo "No change in stock.xml - nothing to save."
          else
            git add stock.xml
            git commit -m "Update stock $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
